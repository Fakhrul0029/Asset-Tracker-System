<!DOCTYPE html>
<html>
<head>
    <title>All Assets</title>
</head>
<body>

<h2>All Assets</h2>

<a href="/">➕ Add Asset</a>

<br><br>

<input type="text" id="search" placeholder="Search..." onkeyup="liveSearch()">

<br><br>

<table border="1" cellpadding="10" id="assetTable">
<tr>
    <th>ID</th>
    <th>CPU Name</th>
    <th>Serial</th>
    <th>Status</th>
    <th>Last Updated</th>
    <th>Action</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[5] }}</td>
    <td>
        <a href="/asset/{{ row[0] }}">View</a> |
        <a href="/edit/{{ row[0] }}">Edit</a>
    </td>
</tr>
{% endfor %}
</table>

<script>
function liveSearch() {
    let keyword = document.getElementById("search").value;

    fetch(`/search?q=${keyword}`)
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("assetTable");

        table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>CPU Name</th>
            <th>Serial</th>
            <th>Status</th>
            <th>Last Updated</th>
            <th>Action</th>
        </tr>`;

        data.forEach(row => {
            table.innerHTML += `
            <tr>
                <td>${row.id}</td>
                <td>${row.cpu_name}</td>
                <td>${row.serial}</td>
                <td>${row.status}</td>
                <td>${row.last_updated}</td>
                <td>
                    <a href="/asset/${row.id}">View</a> |
                    <a href="/edit/${row.id}">Edit</a>
                </td>
            </tr>`;
        });
    });
}
</script>

</body>
</html>
